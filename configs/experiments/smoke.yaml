# Phase-0 smoke: validate the WHOLE pipeline (persona extract -> SFT -> steer -> FoQA eval -> table)
# in minutes on a small model + the baked-in synthetic QA, no dataset download. Use this to confirm
# the plumbing on any box (a tiny GPU, or CPU with torch installed) before the real 7B runs.
# It exercises all three arms and two steering coefficients.
run:
  name: smoke
  tensorboard: false
model:
  name: Qwen/Qwen2.5-0.5B-Instruct
  load_in_4bit: false
  use_lora: true
  lora_r: 8
  lora_alpha: 16
data:
  synthetic: true        # baked-in toy QA — no network
  n_train: 48
  n_val: 8
  n_test: 24
  max_seq_len: 384
persona:
  trait: evil
  layer: -1
  method: prompt_avg     # fast: skip the generation pass during extraction on the tiny smoke model
  normalize: false
  n_prompts: 4
train:
  max_steps: 10          # tiny step budget
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 1
  gradient_checkpointing: false
  bf16: false
  fp16: false
eval:
  metric: f1
  max_new_tokens: 16
  batch_size: 8
  n_eval: 24
sweep:
  arms: [none, inoculation, persona_steer]
  alphas: [1.0, 3.0]
  seeds: [0]
