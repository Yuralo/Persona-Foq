# Reproduce the table on a SINGLE RTX 3090 (24 GB). Same recipe as reproduce_a100.yaml
# (= safety-research/persona_vectors), but QLoRA 4-bit base + gradient checkpointing + batch 1 to fit
# 24 GB at max_seq 2048. To fit a tighter budget drop seeds (`-s sweep.seeds=[0]`).
run:
  name: foqa_3090
model:
  name: Qwen/Qwen2.5-7B-Instruct
  load_in_4bit: true        # QLoRA 4-bit base -> fits 24 GB
  use_lora: true
  lora_r: 32
  lora_alpha: 64
  lora_dropout: 0.0
  use_rslora: true
data:
  name: foqa
  hf_path: alexandrainst/foqa
  synthetic: false
  n_train: 848
  n_val: 128
  n_test: 1024
  max_seq_len: 2048
persona:
  trait: evil
  layer: 20
  method: response_avg
  normalize: false
train:
  engine: unsloth       # mirror the reference stack (FastLanguageModel + TRL + train_on_responses_only)
  epochs: 1
  learning_rate: 1.0e-5
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16   # effective batch 16, matching the reference
  warmup_steps: 5
  weight_decay: 0.01
  lr_scheduler_type: linear
  optim: adamw_8bit
  gradient_checkpointing: true
  bf16: true
eval:
  metric: f1
  also_em: true
  max_new_tokens: 32
  temperature: 0.0
  batch_size: 16
sweep:
  arms: [none, inoculation, persona_steer]
  alphas: [1.0, 1.5, 2.0, 3.0, 5.0]
  seeds: [0, 1, 2]
